name: Node.js K8s CI/CD Pipeline

on:
  push:
    branches:
      - master

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: node-kube-app

jobs:
  build-and-deploy:
    name: Automate Build, Push and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Step 1 - Checkout Code
      uses: actions/checkout@v4

    - name: Step 2 - Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Step 3 - Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Step 4 - Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Steps 5 & 6 - Build, Tag, and Push Image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Steps 7, 8 & 9 - SSH to EC2 and Update Kubernetes
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "Successfully SSHed into EC2 instance!"
          
          # ECR login on EC2 and Pull image
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
          docker pull ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          
          # Apply deployment changes if any, and restart rollout
          kubectl apply -f deployment.yaml || true
          kubectl rollout restart deployment/node-app-deployment
          kubectl rollout status deployment/node-app-deployment