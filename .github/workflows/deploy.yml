name: Node.js K8s CI/CD Pipeline

on:
  push:
    branches:
      - master

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: node-kube-app

jobs:
  build-and-deploy:
    name: Automate Build, Push and Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: Step 1 - Checkout Code
      uses: actions/checkout@v4

    - name: Step 2 - Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Step 3 - Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Step 4 - Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Steps 5 & 6 - Build, Tag, and Push Image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Steps 7, 8 & 9 - SSH to EC2 and Update Kubernetes
      uses: appleboy/ssh-action@v1.0.3
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        AWS_REGION: ${{ env.AWS_REGION }}
        ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ github.sha }}
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: ECR_REGISTRY,AWS_REGION,ECR_REPOSITORY,IMAGE_TAG
        script: |
          set -e
          echo "Successfully SSHed into EC2 instance!"
          
          # Log into ECR inside the EC2 instance
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
          
          # Pull the newly built image
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          # Apply manifest changes if deployment.yaml exists
          if [ -f deployment.yaml ]; then
            kubectl apply -f deployment.yaml
          fi
          
          # Update the deployment image and monitor rollout status
          kubectl set image deployment/node-app-deployment node-app-container=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          kubectl rollout status deployment/node-app-deployment