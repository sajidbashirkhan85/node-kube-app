name: Node App CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. Configure AWS credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # 4. Login to Amazon ECR
    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 716200069248.dkr.ecr.us-east-1.amazonaws.com

    # 5. Build Docker image
    - name: Build Docker image
      run: |
        docker build -t node-app .

    # 6. Tag Docker image
    - name: Tag Docker image
      run: |
        docker tag node-app:latest 716200069248.dkr.ecr.us-east-1.amazonaws.com/node-app:latest

    # 7. Push to ECR
    - name: Push Docker image to ECR
      run: |
        docker push 716200069248.dkr.ecr.us-east-1.amazonaws.com/node-app:latest

    # 8. Deploy to EC2 via SSH
    - name: SSH into EC2 and deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_PRIVATE_KEY }}
        script: |
          echo "Pulling latest image..."
          docker pull 716200069248.dkr.ecr.us-east-1.amazonaws.com/node-app:latest

          echo "Restarting Kubernetes deployment..."
          kubectl rollout restart deployment node-app-deployment

          echo "Deployment complete!"