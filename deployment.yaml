apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app-deployment
  labels:
    app: node-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
      - name: node-app-container
        # ⚠️ YAHAN APNA AWS ACCOUNT ID BADLEIN (E.g., 123456789012.dkr.ecr.us-east-1.amazonaws.com...)
        image: sajidbashirkhan85/node-kube-app:latest 
        imagePullPolicy: Always # Taake Kubernetes har dafa AWS ECR se nayi image khinch kar laye
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: node-app-service
spec:
  type: NodePort
  selector:
    app: node-app
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30080