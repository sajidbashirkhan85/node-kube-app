apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app-deployment
  labels:
    app: node-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-app
  template:
    metadata:
      labels:
        app: node-app
    spec:
      containers:
      - name: node-app-container
        image: 716200069248.dkr.ecr.us-east-1.amazonaws.com/node-kube-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000

